services:
  migrate:
    image: migrate/migrate:v4.19.0
    env_file: .env
    volumes:
      - ./migrations/versions:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${DB_USER}:${DB_PASSWORD}@psql:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}",
        "up",
      ]
    depends_on:
      psql:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - repos_data:/data/repos
    env_file: .env
    stop_grace_period: 20s
    depends_on:
      migrate:
        condition: service_completed_successfully
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy

  psql:
    image: postgres:17-alpine
    volumes:
      - psql_data:/var/lib/postgresql/data
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    env_file: .env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  repos_data:
  psql_data:
  redis_data:
